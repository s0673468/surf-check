<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Surf Floripa Forecast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.open-meteo.com" />
    <link rel="preconnect" href="https://marine-api.open-meteo.com" />
    <link rel="preconnect" href="https://unpkg.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Florianopolis</p>
          <h1>Surf Morning Score</h1>
        </div>
        <div class="topbar-status">
          <div class="status-pill" id="statusPill">
            <span class="status-dot"></span>
            <span id="statusText">Loading forecast</span>
          </div>
          <div class="temp-strip" id="tempStrip">
            <span>Regional temps</span>
            <strong>Air -- · Water --</strong>
          </div>
        </div>
      </header>

      <main class="dashboard">
        <section class="control-strip" aria-label="Forecast controls">
          <div class="control-group">
            <span class="control-label">Day</span>
            <div class="segmented" id="dayControls"></div>
          </div>
          <div class="control-group hour-control">
            <span class="control-label">Hour</span>
            <div class="hour-rail" id="hourControls"></div>
          </div>
        </section>

        <section class="main-grid">
          <div class="map-panel">
            <div id="map" class="map"></div>
            <div id="fallbackMap" class="fallback-map" hidden></div>
            <div class="map-legend" aria-label="Score legend">
              <span><i class="legend-swatch excellent"></i>80+</span>
              <span><i class="legend-swatch good"></i>65</span>
              <span><i class="legend-swatch fair"></i>50</span>
              <span><i class="legend-swatch poor"></i>&lt;50</span>
            </div>
          </div>

          <aside class="side-panel">
            <div class="selected-summary" id="selectedSummary"></div>
            <div class="metric-grid" id="metricGrid"></div>
            <div class="breakdown" id="scoreBreakdown"></div>
          </aside>
        </section>

        <section class="bottom-grid">
          <div class="ranked-list" id="rankedList"></div>
          <div class="timeline-panel" id="timelinePanel"></div>
        </section>

        <section class="data-panel" id="dataPanel"></section>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
