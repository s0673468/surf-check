<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Surfe em Floripa</title>
    <meta
      name="description"
      content="Como o surfe está se formando nas praias de Florianópolis."
    />
    <meta name="theme-color" content="#1B1B29" />
    <link rel="canonical" href="https://s0673468.github.io/surf-check/" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="./favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />

    <!-- Social / link-share cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Surf Check" />
    <meta property="og:title" content="Surfe em Floripa" />
    <meta
      property="og:description"
      content="Como o surfe está se formando nas praias de Florianópolis."
    />
    <meta property="og:url" content="https://s0673468.github.io/surf-check/" />
    <meta property="og:image" content="https://s0673468.github.io/surf-check/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Surfe em Floripa" />
    <meta
      name="twitter:description"
      content="Como o surfe está se formando nas praias de Florianópolis."
    />
    <meta name="twitter:image" content="https://s0673468.github.io/surf-check/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.open-meteo.com" />
    <link rel="preconnect" href="https://marine-api.open-meteo.com" />
    <link rel="preconnect" href="https://unpkg.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..700,0..1,-50..200&display=block"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark material-symbols-rounded" aria-hidden="true">surfing</span>
          <div>
            <p class="eyebrow">Florianópolis</p>
            <h1>Como tá o surfe</h1>
          </div>
        </div>
        <div class="topbar-status">
          <div class="lang-toggle" id="langToggle" role="group" aria-label="Idioma / Language">
            <button type="button" data-lang="pt" aria-pressed="true">PT</button>
            <button type="button" data-lang="en" aria-pressed="false">EN</button>
          </div>
          <div class="status-pill" id="statusPill">
            <span class="status-dot"></span>
            <span id="statusText" role="status" aria-live="polite">Carregando previsão</span>
          </div>
          <div class="temp-strip" id="tempStrip">
            <span>Temperaturas</span>
            <strong>Ar -- · Água --</strong>
          </div>
        </div>
      </header>

      <main class="dashboard">
        <section class="control-strip" aria-label="Forecast controls">
          <div class="control-group">
            <span class="control-label">Dia</span>
            <div class="segmented" id="dayControls"></div>
          </div>
          <div class="control-group hour-control">
            <span class="control-label">Hora</span>
            <div class="hour-rail" id="hourControls"></div>
          </div>
        </section>

        <section class="day-overview" id="dayOverview" hidden></section>

        <section class="hero-grid">
          <div class="best-bets" id="rankedList"></div>
          <div class="map-panel">
            <div id="map" class="map"></div>
            <div id="fallbackMap" class="fallback-map" hidden></div>
            <div class="map-legend" aria-label="Score legend"></div>
          </div>
        </section>

        <section class="detail-grid">
          <aside class="side-panel">
            <div class="selected-summary" id="selectedSummary"></div>
            <div class="metric-grid" id="metricGrid"></div>
          </aside>
          <div class="timeline-panel" id="timelinePanel"></div>
        </section>

      </main>

      <footer class="app-footer">
        <span>Previsão do Open-Meteo · pontuação heurística — não substitui dar uma olhada no mar de verdade.</span>
      </footer>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
      onerror="window.__leafletFailed = true"
    ></script>
    <script src="./forecast-api.js"></script>
    <script src="./score-model.js"></script>
    <script src="./forecast-selectors.js"></script>
    <script src="./rain-radar.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
