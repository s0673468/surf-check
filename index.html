<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Floripa Surf Check</title>
    <meta
      name="description"
      content="A quick read on how the surf is shaping up around Florianópolis."
    />
    <meta name="theme-color" content="#1B1B29" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.open-meteo.com" />
    <link rel="preconnect" href="https://marine-api.open-meteo.com" />
    <link rel="preconnect" href="https://unpkg.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..700,0..1,-50..200"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark material-symbols-rounded" aria-hidden="true">surfing</span>
          <div>
            <p class="eyebrow">Florianópolis</p>
            <h1>Surf check</h1>
          </div>
        </div>
        <div class="topbar-status">
          <div class="status-pill" id="statusPill">
            <span class="status-dot"></span>
            <span id="statusText">Loading forecast</span>
          </div>
          <div class="temp-strip" id="tempStrip">
            <span>Regional temps</span>
            <strong>Air -- · Water --</strong>
          </div>
        </div>
      </header>

      <main class="dashboard">
        <section class="control-strip" aria-label="Forecast controls">
          <div class="control-group">
            <span class="control-label">Day</span>
            <div class="segmented" id="dayControls"></div>
          </div>
          <div class="control-group hour-control">
            <span class="control-label">Hour</span>
            <div class="hour-rail" id="hourControls"></div>
          </div>
        </section>

        <section class="hero-grid">
          <div class="best-bets" id="rankedList"></div>
          <div class="map-panel">
            <div id="map" class="map"></div>
            <div id="fallbackMap" class="fallback-map" hidden></div>
            <div class="map-legend" aria-label="Score legend">
              <span><i class="legend-swatch excellent"></i>80+</span>
              <span><i class="legend-swatch good"></i>65</span>
              <span><i class="legend-swatch fair"></i>50</span>
              <span><i class="legend-swatch poor"></i>&lt;50</span>
            </div>
          </div>
        </section>

        <section class="detail-grid">
          <aside class="side-panel">
            <div class="selected-summary" id="selectedSummary"></div>
            <div class="metric-grid" id="metricGrid"></div>
          </aside>
          <div class="timeline-panel" id="timelinePanel"></div>
        </section>
      </main>

      <footer class="app-footer">
        <span>Forecast from Open-Meteo · heuristic scoring, not a substitute for a real look at the beach.</span>
      </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
