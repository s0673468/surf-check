name: test

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  static-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Syntax-check all runtime scripts
        run: |
          for f in forecast-api.js score-model.js forecast-selectors.js rain-radar.js app.js; do
            node --check "$f"
          done
      - run: npm test
